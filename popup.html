<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Météo</title>
</head>
<body>

    <div class="weather-card">

        <h1 class="title"> Météo</h1>

        <form>
            <label for="city"></label>
            <input id="city" name="city" type="text" placeholder="Nice">
            <button id="btnSend">Rechercher</button>
        </form>

        <div id="quality_block">
            <p id="quality_value"></p>
        </div>

        <div id="temperature_Block">
            <p id="temperature"></p>
        </div>

    </div>

<script src="popup.js"></script>

</body>
</html>
